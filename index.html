<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NSBTEK</title>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirectedPath = params.get("p");

        if (redirectedPath) {
          var decodedPath = decodeURIComponent(redirectedPath);
          var newUrl = decodedPath + window.location.hash;
          window.history.replaceState(null, "", newUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.jsx"></script>
  </body>
</html>
